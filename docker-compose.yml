services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: profind
      POSTGRES_PASSWORD: profind_password
      POSTGRES_DB: profind_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profind"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "bin/rails db:prepare &&
             bin/rails db:seed &&
             bin/rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY_PRODUCTION}
      DB_HOST: db
      POSTGRES_USER: profind
      POSTGRES_PASSWORD: profind_password
      POSTGRES_DB: profind_production
      RAILS_LOG_TO_STDOUT: "true"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/rails/storage

volumes:
  postgres_data:
  storage:
